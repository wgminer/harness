name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  rust:
    name: Rust unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --lib

  ios:
    name: iOS unit tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run iOS tests
        working-directory: ios
        run: |
          # Runner images ship different iPhone / iOS Simulator combos; pick the newest available.
          DESTINATION="$(
            xcrun simctl list devices available -j | python3 -c '
          import json, re, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              if "SimRuntime.iOS-" not in runtime:
                  continue
              m = re.search(r"iOS-(\d+(?:-\d+)*)", runtime)
              ver = tuple(int(p) for p in m.group(1).split("-")) if m else (0,)
              for device in devices:
                  name = device.get("name", "")
                  if not name.startswith("iPhone"):
                      continue
                  if device.get("isAvailable") is False:
                      continue
                  udid = device.get("udid")
                  if udid:
                      candidates.append((ver, name, udid))
          if not candidates:
              sys.exit("No available iPhone simulator found")
          # Newest iOS first; prefer numbered iPhones (17, 16, …) over Air.
          candidates.sort(
              key=lambda item: (
                  item[0],
                  1 if re.match(r"iPhone \d", item[1]) else 0,
                  item[1],
              ),
              reverse=True,
          )
          _ver, name, udid = candidates[0]
          print(f"Using simulator: {name}", file=sys.stderr)
          print(f"platform=iOS Simulator,id={udid}")
          '
          )"
          echo "destination=${DESTINATION}"
          xcodebuild test \
            -scheme HarnessMobile \
            -destination "${DESTINATION}" \
            -quiet
